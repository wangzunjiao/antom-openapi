---
openapi: 3.1.0
info:
  title: subscriptions_update
  description: ''
  version: 1.0.0
tags: []
paths:
  /ams/api/v1/subscriptions/update:
    post:
      summary: update
      deprecated: false
      description: 'Use this API to get the cashier page address. After getting the
        cashier page address, you can redirect the user to the cashier page to make
        a payment.

        '
      tags: []
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlipaySubscriptionUpdateRequest'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlipaySubscriptionUpdateResponse'
          headers: {}
      security: []
components:
  schemas:
    Result:
      type: object
      properties:
        resultCode:
          type: string
          description: The result code.
        resultStatus:
          description: "The result status. Valid values are:\n\nS: indicates that\ \
            \ the result status is successful.\nF: indicates that the result status\ \
            \ is failed. \nU: indicates that the result status is unknown. "
          $ref: '#/components/schemas/ResultStatusType'
        resultMessage:
          type: string
          description: The result message.
      required:
      - resultCode
      - resultStatus
      - resultMessage
    Amount:
      type: object
      properties:
        currency:
          type: string
          description: "The 3-letter currency code that follows the ISO 4217 standard.\ \
            \n\nMore information:\n\nMaximum length: 3 characters"
        value:
          type: string
          description: "The value of the amount as a positive integer in the smallest\ \
            \ currency unit. For example, if the currency is USD and the amount is\ \
            \ $1.00, set the value of this parameter to 100; or if the currency is\ \
            \ JPY and the amount is \uFFE51, set the value of this parameter to 1.  \ \
            \n\nFor details about the smallest currency unit, see Smallest unit of\ \
            \ the\ \
            \ currency .\n\nFor details about the minimum payment amount allowed for\ \
            \ each payment method, see Minimum amount rules. \n\nNote: Due to the\ \
            \ currency practices in Indonesia, when the currency is IDR, round the\ \
            \ amount with banker\''s rounding and fix the last two digits of this parameter\ \
            \ as 00.  \ \
            \n\nMore information:\n\nValue range: 0 - unlimited\n"
      required:
      - currency
      - value
    ProrationSettings:
      type: object
      properties:
        prorationMode:
          type: string
          description: "用于标识\"扣差价\"或者\"退差价\"场景。有差价处理需求场景必传。\ \
            \n\n取值范围：\n- IMMEDIATE_PAY_CUSTOM_AMOUNT：商户指定金额扣款模式，在这个模式下商户可以用customAmount的指定金额扣差价，差价需要商户提前算好\n- IMMEDIATE_REFUND_CUSTOM_AMOUNT：商户指定金额退款模式，在这个模式下商户可以用customAmount的指定金额来退差价，差价需要商户提前算好"
          enum:
          - IMMEDIATE_PAY_CUSTOM_AMOUNT
          - IMMEDIATE_REFUND_CUSTOM_AMOUNT
        customAmount:
          $ref: '#/components/schemas/Amount'
          description: 差价金额object。prorationMode为IMMEDIATE_PAY_CUSTOM_AMOUNT或IMMEDIATE_REFUND_CUSTOM_AMOUNT时必传
    ResultStatusType:
      type:
      - string
      - 'null'
      enum:
      - S
      - F
      - U
    PeriodType:
      type: string
      enum:
      - WEEK
      - MONTH
      - QUARTER
      - HALF_YEAR
      - YEAR
      description: "The subscription period type. Valid values are:\n\nWEEK: indicates\ \
        \ that the subscription period is measured in weeks.\nMONTH: indicates\ \
        \ that the subscription period is measured in months.\nQUARTER: indicates\ \
        \ that the subscription period is measured in quarters.\nHALF_YEAR: indicates\ \
        \ that the subscription period is measured in half years.\nYEAR: indicates\ \
        \ that the subscription period is measured in years."
    PeriodRule:
      type: object
      properties:
        periodType:
          type: string
          description: "The subscription period type.\n\nMore information:\n\nMaximum\
            \ length: 20 characters"
        period:
          type: integer
          description: Number of periods
        price:
          $ref: '#/components/schemas/Amount'
          description: Amount for each period
        periodCount:
          type: integer
          description: "The number of period types within one subscription period.\ \
            \ For example, if the value of periodType is MONTH and the value of periodCount\ \
            \ is 2, it means that the subscription period is two months.  \ \
            \n\nMore\ \
            \ information:\n\nValue range: 1 - unlimited"
      required:
      - periodType
      - periodCount
    OrderInfo:
      type: object
      properties:
        orderAmount: &id001
          $ref: '#/components/schemas/Amount'
      required:
      - orderAmount
    AlipaySubscriptionUpdateRequest:
      type: object
      properties:
        subscriptionUpdateRequestId:
          type: string
          description: 'The unique ID assigned by a merchant to identify a subscription
            update request.


            More information:


            Maximum length: 64 characters'
        subscriptionId:
          type: string
          description: "The unique ID assigned by Antom to identify a subscription.\ \
            \ 
\nMore information:\n\nMaximum length: 64 characters"
        subscriptionDescription:
          type: string
          description: 'The description of the subscription, used for displaying user
            consumption records and other actions.


            More information:


            Maximum length: 256 characters'
        periodRule:
          $ref: '#/components/schemas/PeriodRule'
          description: The subscription period rule, used to define a subscription's
            billing period.
        paymentAmount: *id001
        subscriptionEndTime:
          type: string
          description: 'The date and time when the subscription ends.


            More information:


            The value follows the ISO 8601 standard format. For example, "2019-11-27T12:01:01+08:00".'
        orderInfo:
          $ref: '#/components/schemas/OrderInfo'
          description: 'The order information of the subscription. This field is used
            for different purposes:


            During the payment process, this field is mainly used by Antom for risk
            control or anti-money laundering.


            After the payment is completed, this field is used for recording and reporting
            purposes such as purchase tracking and regulatory reporting.'
        prorationSettings:
          $ref: '#/components/schemas/ProrationSettings'
          description: 差价处理字段。有差价处理需求场景传，否则不用传
        nextSubscriptionDate:
          type: string
          description: "商户指定的下次扣款时间。遵循ISO 8601标准。\ \
            \n\n允许更改的时间要在一个周期内。\n\n注意：由于订阅产品会在履约时间24小时前开始尝试扣款，商户指定的下次扣款时间至少要在当前时间的24小时之后。如商户指定的下次扣款时间小于当前时间的24小时，预期订阅升级失败并返回PROCCESS_FAIL错误码。"
      required:
      - subscriptionUpdateRequestId
      - subscriptionId
      - orderInfo
    AlipaySubscriptionUpdateResponse:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/Result'
      required:
      - result
  securitySchemes: {}
servers:
- url: https://open-sea-global.alipay.com/ams/api/v1/subscriptions/update
  description: 正式环境
security: []
