    AlipayInquireDirectPaymentResponse:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/Result'
          description: |-
            The request result contains information such as status and error codes.

            Note: This field does not indicate the payment result. This field only indicates whether the inquireDirectPayment interface is called successfully.
        paymentStatus:
          $ref: '#/components/schemas/TransactionStatusType'
          description: |-
            Transaction status. Valid values are:

            SUCCESS: Transaction is successful.
            FAIL: Transaction failed.
            PROCESSING: Transaction is being processed.
            CANCELLED: Transaction is canceled.
            PENDING: Transaction is pending.

            Note: This field is null when the payment record cannot be found, or result.resultStatus is F or U.

            More information:

            Maximum length: 16 characters
        paymentResultCode:
          type: string
          description: |-
            The result code for different payment statuses. Possible payment result codes are listed in the Payment result codes table on this page.

            Note: This field is returned when the API is called successfully (the value of result.resultStatus is S).

            More information:

            Maximum length: 64 characters
        paymentResultMessage:
          type: string
          description: |-
            The result message that explains the payment result code.

            Note: This field is returned when the API is called successfully (the value of result.resultStatus is S).

            More information:

            Maximum length: 256 characters
        paymentId:
          type: string
          description: |-
            The unique ID that is assigned by Antom to identify a payment. A one-to-one correspondence between paymentId and paymentRequestId exists.

            Note: This field is null when the payment record cannot be found, or result.resultStatus is F or U.

            More information:

            Maximum length: 64 characters
        paymentRequestId:
          type: string
          description: |-
            The unique ID that is assigned by the merchant to identify a payment request.

            Note: This field is null when the payment record cannot be found, or result.resultStatus is F or U.

            More information:

            Maximum length: 64 characters
        payToMethod:
          $ref: '#/components/schemas/PaymentMethod'
