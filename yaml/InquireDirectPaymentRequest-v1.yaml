    PaymentMethod:
      type: object
      properties:
        paymentMethodType:
          type: string
          description: |-
            The payment method type that is included in payment method options. By specifying the value of this parameter, you can receive the cashier URL of the specified payment method returned by Alipay. See Payment methods to check the valid values.

            More information:

            Maximum length: 64 characters
        paymentMethodId:
          type: string
          description: |-
            The unique ID that is used to identify a payment method. The value of this parameter is that of cardToken obtained from the notifyPayment or inquiryPayment API.

            Specify this parameter when the value of paymentMethodType is CARD.

            More information:

            Maximum length: 128 characters
        funding:
          type: string
          enum:
            - CREDIT
            - DEBIT
            - PREPAID
            - CHARGE
            - DEFERRED_DEBIT
          description: The funding source type for the payment method.
        customerId:
          type: string
          description: |-
            The unique ID to identify a buyer.

            Note: Specify this field if you have the information. Providing this information helps to increase the accuracy of anti-money laundering and fraud detection, and increase payment success rates.
        extendInfo:
          type: string
          description: |-
            Extended information.

            Note: Specify this field if you need to use the extended information.

            More information:

            Maximum length: 2048 characters
        requireIssuerAuthentication:
          type: boolean
          description: |-
            Indicates whether Korean card transactions require authentication from the issuing bank. Valid values are:

            true: indicates that Korean card transactions require authentication from the issuing bank.
            false: indicates that Korean card transactions do not require authentication from the issuing bank. The same applies when you do not specify this parameter or the value is empty.

            Specify this parameter when all the following conditions are met:

            The value of paymentMethodType is CARD.
            The value of paymentMethodRegion is KR.
            The Korean card transactions require issuer authentication.
        paymentMethodMetaData:
          type: object
          properties: {}
          additionalProperties:
            type: object
          description: Additional information required for some specific payment methods.
      required:
        - paymentMethodType
    Amount:
      type: object
      properties:
        currency:
          type: string
          description: |-
            The 3-letter currency code that follows the ISO 4217 standard.

            More information:

            Maximum length: 3 characters
        value:
          type: string
          description: |-
            The value of the amount as a positive integer in the smallest currency unit. For example, if the currency is USD and the amount is $1.00, set the value of this parameter to 100; or if the currency is JPY and the amount is ￥1, set the value of this parameter to 1.

            For details about the smallest currency unit, see Smallest unit of the currency.

            For details about the minimum payment amount allowed for each payment method, see Minimum amount rules.

            Note: Due to the currency practices in Indonesia, when the currency is IDR, round the amount with banker's rounding and fix the last two digits of this parameter as 00.

            More information:

            Value range: 0 - unlimited
      required:
        - currency
        - value
