        paymentAmount:
          $ref: '#/components/schemas/Amount'
          description: |-
            The payment amount that is initiated by the merchant.

            Note: This field is null when the payment record cannot be found, or result.resultStatus is F or U.
        payToAmount:
          $ref: '#/components/schemas/Amount'
          description: |-
            The actual amount received.

            Note: This field is null when the payment record cannot be found, or result.resultStatus is F or U.
        paymentTime:
          type: string
          description: |-
            The date and time when the payment reaches a final state of success on the Antom side.

            Note: This field is returned when the value of paymentStatus is SUCCESS.

            More information:

            The value follows the ISO 8601 standard format. For example, "2019-11-27T12:01:01+08:00".
      required:
